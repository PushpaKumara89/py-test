apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
data:
  DEBUG: "True"
  ALLOWED_HOSTS: "localhost,127.0.0.1,frontend.kubepulse.local,api.kubepulse.local"
  CORS_ALLOWED_ORIGINS: "http://localhost:4200,http://frontend.kubepulse.local"
  POSTGRES_DB: {{ .Values.postgres.db }}
  REDIS_URL: redis://{{ .Release.Name }}-redis-svc:6379/0
  DATABASE_URL: "postgres://postgres_user:postgres_password@{{ .Release.Name }}-postgres:5432/kubepulse_db"