<div class="flex items-center justify-center min-h-screen bg-slate-900 px-4">
  <div class="w-full max-w-md p-8 bg-slate-800 rounded-2xl shadow-2xl border border-slate-700">

    <div class="text-center mb-8">
      <h2 class="text-4xl font-extrabold text-white tracking-tight">KubePulse</h2>
      <p class="text-slate-400 mt-2 text-sm">පද්ධතියට ඇතුළු වීමට ඔබගේ ගිණුම් තොරතුරු ලබා දෙන්න</p>
    </div>

    <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-500/20 border border-red-500 text-red-200 text-sm rounded-xl text-center">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm" class="space-y-6">
      <div>
        <label class="block text-sm font-semibold text-slate-300 mb-2">Username / Email</label>
        <input type="text" name="username" [(ngModel)]="credentials.email" required
               class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-300 mb-2">Password</label>
        <input type="password" name="password" [(ngModel)]="credentials.password" required
               class="w-full px-4 py-3 bg-slate-900 border border-slate-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
      </div>

      <button type="submit" [disabled]="!loginForm.form.valid"
              class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 text-white font-bold rounded-xl shadow-lg hover:shadow-blue-500/20 transition-all cursor-pointer">
        Sign In
      </button>
      <p class="text-center text-slate-400 text-sm mt-4">
       If you don't have an Account still? <a href="/register" class="text-blue-400 hover:underline">Register</a>
      </p>
    </form>

  </div>
</div>
