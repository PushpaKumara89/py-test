<div class="flex items-center justify-center min-h-screen bg-slate-900 px-4">
  <div class="w-full max-w-md p-8 bg-slate-800 rounded-2xl shadow-2xl border border-slate-700">
    <h2 class="text-3xl font-bold text-white mb-6 text-center">Account Create කරමු</h2>
    
    <form (ngSubmit)="onRegister()" #regForm="ngForm" class="space-y-4">
      <div>
        <label class="text-slate-300 text-sm">Username</label>
        <input type="text" [(ngModel)]="user.username" name="username" required class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-white">
      </div>
      <div>
        <label class="text-slate-300 text-sm">Email</label>
        <input type="email" [(ngModel)]="user.email" name="email" required class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-white">
      </div>
      <div>
        <label class="text-slate-300 text-sm">Password</label>
        <input type="password" [(ngModel)]="user.password" name="password" required class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl text-white">
      </div>
      <button type="submit" [disabled]="!regForm.form.valid" class="w-full py-3 bg-emerald-600 hover:bg-emerald-500 text-white font-bold rounded-xl transition-all">
        Register
      </button>
      <p class="text-center text-slate-400 text-sm mt-4">
        Do you have an account already? <a href="/login" class="text-blue-400 hover:underline">Sign In</a>
      </p>
    </form>
  </div>
</div>
